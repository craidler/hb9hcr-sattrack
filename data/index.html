<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HB9HCR Sattrack</title>
    <link rel="icon" type="image/svg" href="/favicon.svg">
    <style>
        body {
            font-family: monospace;
            text-align: center;
            padding: 0 1rem;
            background: #333;
            color: #fff;
        }

        button {
            min-height: 50px;
        }

        button:active {
            background: #555 !important;
        }

        button.span {
            grid-row: span 2;
        }

        .container {
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 1rem;
        }

        .grid>* {
            padding: .5rem;
            border: 1px solid transparent;
        }

        .grid>button {
            background: #444;
            border: 1px solid #fff;
            color: #fff;
        }

        .mt {
            margin-top: 1rem;
        }

        .header {
            font-weight: 800;
            font-size: 3rem;
            display: table;
            margin: 2rem auto;
            color: #000;
        }

        .header>* {
            vertical-align: middle;
        }

        .header img {
            margin: 0 .25rem;
            max-height: 4rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <span>HB9</span>
            <img src="/symbol.svg" alt="symbol">
            <span>HCR</span>
        </div>
        <div class="grid mt">
            <span>Axis</span>
            <span>
                <span id="az_axis">0</span><span>°</span>
            </span>
            <span><strong>AZIMUTH</strong></span>
            <span>Sensor</span>
            <span>
                <span id="az_sensor">0</span><span>°</span>
            </span>
        </div>
        <div class="grid">
            <button data-axis="az" data-target="270" class="span">270° W</button>
            <button data-axis="az" data-target="315">315° NW</button>
            <button data-axis="az" data-target="0">0° N</button>
            <button data-axis="az" data-target="45">45° NE</button>
            <button data-axis="az" data-target="90" class="span">90° E</button>
            <button data-axis="az" data-target="225">225° SE</button>
            <button data-axis="az" data-target="180">180° S</button>
            <button data-axis="az" data-target="135">135° SW</button>
        </div>
        <div class="grid mt">
            <span>Axis</span>
            <span>
                <span id="el_axis">0</span><span>°</span>
            </span>
            <span><strong>ELEVATION</strong></span>
            <span>Sensor</span>
            <span>
                <span id="el_sensor">0</span><span>°</span>
            </span>
        </div>
        <div class="grid">
            <button data-axis="el" data-target="0">0°</button>
            <button data-axis="el" data-target="22.5">22.5°</button>
            <button data-axis="el" data-target="45">45°</button>
            <button data-axis="el" data-target="67.5">67.5°</button>
            <button data-axis="el" data-target="90">90°</button>
        </div>
    </div>
    <div id="debug">debug</div>
    <script>
        setInterval(function () {
            fetch('/data').then(response => response.json()).then(data => {
                document.getElementById('az_axis').innerText = data.az_axis.toFixed(2);
                document.getElementById('az_sensor').innerText = data.az_sensor.toFixed(2);
                document.getElementById('el_axis').innerText = data.el_axis.toFixed(2);
                document.getElementById('el_sensor').innerText = data.el_sensor.toFixed(2);
            });
        }, 1000);

        let debug = document.querySelector('#debug');

        document.querySelectorAll('button[data-axis]').forEach(element => {
            element.addEventListener('click', (event) => {
                let url = new URL('http://192.168.4.1/move');
                url.searchParams.append('axis', element.dataset.axis);
                url.searchParams.append('target', element.dataset.target);
                fetch(url).finally(() => {
                    debug.innerHTML = url.toString();
                });
            });
        });
    </script>
</body>

</html>
