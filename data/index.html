<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HB9HCR Sattrack</title>
    <link rel="icon" type="image/svg" href="favicon.svg">
    <link rel="stylesheet" href="ui.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <span>HB9</span>
            <img src="symbol.svg" alt="symbol">
            <span>HCR</span>
        </div>
        <h2>TRACKER</h2>
        <div id="tracker" class="grid mt">
            <span>AOS AZ&deg;</span>
            <span>AOS EL&deg;</span>
            <span><strong>MAX EL&deg;</strong></span>
            <span>LOS AZ&deg;</span>
            <span>LOS EL&deg;</span>
            <input id="aos_az" type="text" value="0" autocomplete="off">
            <input id="aos_el" type="text" value="0" autocomplete="off">
            <input id="mel_el" type="text" value="0" autocomplete="off">
            <input id="los_az" type="text" value="0" autocomplete="off">
            <input id="los_el" type="text" value="0" autocomplete="off">
            <input id="aos_time" type="text" pattern="[0-9]{4}" value="0000" autocomplete="off">
            <span>AOS</span>
            <span id="time">----</span>
            <span>LOS</span>
            <input id="los_time" type="text" pattern="[0-9]{4}" value="0000" autocomplete="off">
            <span id="state">IDLE</span>
            <button name="set">SET</button>
            <button name="clr">RST</button>
            <button name="exe">EXE</button>
            <span>T-<span id="cd">0</span><span>s</span></span>
        </div>
        <h2>ACTUATOR</h2>
        <div class="grid mt">
            <span>ABS</span>
            <span>
                <span id="az_pos">0</span>
            </span>
            <span><strong>AZIMUTH</strong></span>
            <span>
                <span id="az_deg">0</span><span>&deg;</span>
            </span>
            <span>REL</span>
            <button name="mve" data-axis="az" data-mode="a" value="270" class="span">270&deg;</button>
            <button name="mve" data-axis="az" data-mode="a" value="315">315&deg;</button>
            <button name="mve" data-axis="az" data-mode="a" value="0">0&deg;</button>
            <button name="mve" data-axis="az" data-mode="a" value="45">45&deg;</button>
            <button name="mve" data-axis="az" data-mode="a" value="90" class="span">90&deg;</button>
            <button name="mve" data-axis="az" data-mode="a" value="225">225&deg;</button>
            <button name="mve" data-axis="az" data-mode="a" value="180">180&deg;</button>
            <button name="mve" data-axis="az" data-mode="a" value="135">135&deg;</button>
            <button name="mve" data-axis="az" data-mode="r" value="-10">-10&deg;</button>
            <button name="mve" data-axis="az" data-mode="r" value="-1">-1&deg;</button>
            <button name="rst" data-axis="az">RST</button>
            <button name="mve" data-axis="az" data-mode="r" value="+1">+1&deg;</button>
            <button name="mve" data-axis="az" data-mode="r" value="+10">+10&deg;</button>
        </div>
        <div class="grid mt">
            <span>ABS</span>
            <span>
                <span id="el_pos">0</span>
            </span>
            <span><strong>ELEVATION</strong></span>
            <span>
                <span id="el_deg">0</span><span>&deg;</span>
            </span>
            <span>REL</span>
            <button name="mve" data-axis="el" data-mode="a" value="0">0&deg;</button>
            <button name="mve" data-axis="el" data-mode="a" value="30">30&deg;</button>
            <button name="mve" data-axis="el" data-mode="a" value="45">45&deg;</button>
            <button name="mve" data-axis="el" data-mode="a" value="60">60&deg;</button>
            <button name="mve" data-axis="el" data-mode="a" value="90">90&deg;</button>
            <button name="mve" data-axis="el" data-mode="r" value="-10">-10&deg;</button>
            <button name="mve" data-axis="el" data-mode="r" value="-1">-1&deg;</button>
            <button name="rst" data-axis="el">RST</button>
            <button name="mve" data-axis="el" data-mode="r" value="+1">+1&deg;</button>
            <button name="mve" data-axis="el" data-mode="r" value="+10">+10&deg;</button>
        </div>
        <p>2026 HB9HCR Sattrack</p>
        <p id="log" class="alert">-</p>
    </div>
    <script src="ui.js"></script>
</body>

</html>
