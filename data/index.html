<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HB9HCR Sattrack</title>
    <link rel="icon" type="image/svg" href="/favicon.svg">
    <style>
        body {
            box-sizing: border-box;
            font-family: monospace;
            text-align: center;
            padding: 0 1rem;
            background: #333;
            color: #fff;
        }

        h2 {
            margin-top: 2rem;
            background: #333;
            padding: .5rem;
            color: #111;
        }

        button {
            min-height: 50px;
        }

        button:active {
            background: #555 !important;
        }

        button.span {
            grid-row: span 2;
        }

        .container {
            margin: 0 auto;
        }

        .grid {
            background: #383838;
            border-radius: .5rem;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 1rem;
            padding: .5rem;
        }

        .grid>* {
            padding: .5rem;
        }

        .grid>button,
        .grid>input,
        .grid>span {
            min-width: 0;
            vertical-align: middle;
            line-height: 3rem;
            text-align: center;
            color: #fff;
        }

        .grid>button,
        .grid>input,
        .grid>input:active {
            background: #444;
            border: 1px solid #aaa;
        }

        .grid>span {
            border: 1px solid #444;
        }

        .mt {
            margin-top: 1rem;
        }

        .header {
            font-weight: 800;
            font-size: 3rem;
            display: table;
            margin: 2rem auto;
            color: #111;
        }

        .header>* {
            vertical-align: middle;
        }

        .header img {
            margin: 0 .25rem;
            max-height: 4rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <span>HB9</span>
            <img src="symbol.svg" alt="symbol">
            <span>HCR</span>
        </div>
        <h2>PASS CONFIGURATION</h2>
        <div class="grid mt">
            <span>AOS AZ&deg;</span>
            <span>AOS EL&deg;</span>
            <span><strong>MAX EL&deg;</strong></span>
            <span>LOS AZ&deg;</span>
            <span>LOS EL&deg;</span>
            <input id="aos_az" type="text" placeholder="0" autocomplete="off">
            <input id="aos_el" type="text" placeholder="0" autocomplete="off">
            <input id="max_el" type="text" placeholder="0" autocomplete="off">
            <input id="los_az" type="text" placeholder="0" autocomplete="off">
            <input id="los_el" type="text" placeholder="0" autocomplete="off">
            <span>AOS</span>
            <input id="aos" type="text" pattern="[0-9]{2}:[0-9]{2}" placeholder="HH:MM" autocomplete="off">
            <span id="time">--:--:--</span>
            <input id="los" type="text" pattern="[0-9]{2}:[0-9]{2}" placeholder="HH:MM" autocomplete="off">
            <span>LOS</span>
            <span id="state">IDLE</span>
            <button name="set">SET</button>
            <button name="clear">CLR</button>
            <button name="execute">EXEC</button>
            <span>T-<span id="cd">0</span><span>s</span></span>
        </div>
        <h2>DIRECT CONTROL</h2>
        <div class="grid mt">
            <span>Axis</span>
            <span>
                <span id="az_axis">0</span><span>&deg;</span>
            </span>
            <span><strong>AZIMUTH</strong></span>
            <span>
                <span id="az_sensor">0</span><span>&deg;</span>
            </span>
            <span>Sensor</span>
            <button data-axis="az" data-target="270" class="span">270&deg;</button>
            <button data-axis="az" data-target="315">315&deg;</button>
            <button data-axis="az" data-target="0">0&deg;</button>
            <button data-axis="az" data-target="45">45&deg;</button>
            <button data-axis="az" data-target="90" class="span">90&deg;</button>
            <button data-axis="az" data-target="225">225&deg;</button>
            <button data-axis="az" data-target="180">180&deg;</button>
            <button data-axis="az" data-target="135">135&deg;</button>
            <button data-axis="az" data-step="-10">-10&deg;</button>
            <button data-axis="az" data-step="-1">-1&deg;</button>
            <button data-zero="az">ZERO</button>
            <button data-axis="az" data-step="+1">+1&deg;</button>
            <button data-axis="az" data-step="+10">+10&deg;</button>
        </div>
        <div class="grid mt">
            <span>Axis</span>
            <span>
                <span id="el_axis">0</span><span>&deg;</span>
            </span>
            <span><strong>ELEVATION</strong></span>
            <span>
                <span id="el_sensor">0</span><span>&deg;</span>
            </span>
            <span>Sensor</span>
            <button data-axis="el" data-target="0">0&deg;</button>
            <button data-axis="el" data-target="22.5">22.5&deg;</button>
            <button data-axis="el" data-target="45">45&deg;</button>
            <button data-axis="el" data-target="67.5">67.5&deg;</button>
            <button data-axis="el" data-target="90">90&deg;</button>
            <button data-axis="el" data-step="-10">-10&deg;</button>
            <button data-axis="el" data-step="-1">-1&deg;</button>
            <button data-zero="el">ZERO</button>
            <button data-axis="el" data-step="+1">+1&deg;</button>
            <button data-axis="el" data-step="+10">+10&deg;</button>
        </div>
    </div>
    <script>
        function timestamp(id) {
            let d = new Date();
            let t = document.querySelector('#' + id).value || String(d.getHours()).padStart(2, 0) + ':' + String(d.getMinutes()).padStart(2, 0);
            let [h, m] = t.split(':').map(Number);
            d.setHours(h, m, 0, 0);
            return d.getTime();
        }

        setInterval(function () {
            fetch('/data').then(response => response.json()).then(data => {
                // document.getElementById('az_axis').innerText = data.az_axis.toFixed(2);
                document.getElementById('az_sensor').innerText = data.az_sensor.toFixed(2);
                // document.getElementById('el_axis').innerText = data.el_axis.toFixed(2);
                document.getElementById('el_sensor').innerText = data.el_sensor.toFixed(2);
                // document.getElementById('datetime').innerText = data.datetime;
            });
        }, 10000);

        let debug = document.querySelector('#debug');

        document.querySelectorAll('button[data-axis][data-target]').forEach(element => {
            element.addEventListener('click', (event) => {
                let url = new URL('http://192.168.4.1/move');
                url.searchParams.append('axis', element.dataset.axis);
                url.searchParams.append('target', element.dataset.target);
                fetch(url).then(response => response.json()).then(data => {
                    const date = new Date(data.timestamp * 1000);
                    document.querySelector("#az_axis").innerText = data.az_degree.toFixed(2);
                    document.querySelector("#el_axis").innerText = data.el_degree.toFixed(2);
                    document.querySelector("#time").innerText = date.getHours().toString().padStart(2, '0') +
                        date.getMinutes().toString().padStart(2, '0') +
                        date.getSeconds().toString().padStart(2, '0');
                });
            });
        });

        document.querySelectorAll('button[data-axis][data-step]').forEach(element => {
            element.addEventListener('click', (event) => {
                let url = new URL('http://192.168.4.1/step');
                url.searchParams.append('axis', element.dataset.axis);
                url.searchParams.append('step', element.dataset.step);
                fetch(url).then(response => response.json()).then(data => {
                    const date = new Date(data.timestamp * 1000);
                    document.querySelector("#az_axis").innerText = data.az_degree.toFixed(2);
                    document.querySelector("#el_axis").innerText = data.el_degree.toFixed(2);
                    document.querySelector("#time").innerText = date.getHours().toString().padStart(2, '0') +
                        date.getMinutes().toString().padStart(2, '0') +
                        date.getSeconds().toString().padStart(2, '0');
                });
            });
        });

        document.querySelectorAll('button[data-zero]').forEach(element => {
            element.addEventListener('click', (event) => {
                let url = new URL('http://192.168.4.1/zero');
                url.searchParams.append('axis', element.dataset.zero);
                fetch(url).then(response => response.json()).then(data => {
                    const date = new Date(data.timestamp * 1000);
                    document.querySelector("#az_axis").innerText = data.az_degree.toFixed(2);
                    document.querySelector("#el_axis").innerText = data.el_degree.toFixed(2);
                    document.querySelector("#time").innerText = date.getHours().toString().padStart(2, '0') + ':' +
                        date.getMinutes().toString().padStart(2, '0') + ':' +
                        date.getSeconds().toString().padStart(2, '0');
                });
            });
        });

        document.querySelector('button[name="execute"]').addEventListener('click', (event) => {
            let url = new URL('http://192.168.4.1/execute');
            fetch(url).then(response => response.json()).then(data => {
            });
        });

        document.querySelector('button[name="clear"]').addEventListener('click', (event) => {
            let url = new URL('http://192.168.4.1/clear');
            fetch(url).then(response => response.json()).then(data => {
            });
        });

        document.querySelector('button[name="set"]').addEventListener('click', (event) => {
            const data = {
                'aos': timestamp('aos'),
                'los': timestamp('los'),
                'aos_az': parseInt(document.querySelector('#aos_az').value) || 0,
                'aos_el': parseInt(document.querySelector('#aos_el').value) || 0,
                'los_az': parseInt(document.querySelector('#los_az').value) || 0,
                'los_el': parseInt(document.querySelector('#los_el').value) || 0,
                'max_el': parseInt(document.querySelector('#max_el').value) || 0,
            };
            
            const response = fetch('http://192.168.4.1/set', {
                method: 'POST',
                headers: {'Content-type': 'application/json'},
                body: JSON.stringify(data),
            });
        });
    </script>
</body>

</html>
